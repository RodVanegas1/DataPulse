services:
  api:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run prisma:seed && npm run start"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      APP_NAME: ${APP_NAME:-Territorial Intelligence Platform API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://tip_user:tip_password@postgres:5432/territorial_intelligence?schema=public}
      API_KEY: ${API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
    ports:
      - "${PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: territorial_intelligence
      POSTGRES_USER: tip_user
      POSTGRES_PASSWORD: tip_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip_user -d territorial_intelligence"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
